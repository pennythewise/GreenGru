<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
<meta charset="utf-8">
<title>{{ title }}</title>
<style>
    /* PRD §8.11 edge case #10: bundle a CJK font explicitly, never rely on
       host-installed fonts, or the first deploy produces tofu (□□)
       passports. If NotoSansSC-Regular.ttf isn't present at
       app/static/fonts (it isn't bundled in this reference repo — see
       README for where to download it), we fall back through commonly
       pre-installed CJK-capable fonts rather than failing outright. */
    @font-face {
        font-family: 'DocumentCJK';
        src: url('{{ font_path }}') format('truetype');
    }
    body {
        font-family: 'DocumentCJK', 'Noto Sans SC', 'Microsoft YaHei', 'SimHei', sans-serif;
        font-size: 11pt;
        color: #1a1a1a;
        line-height: 1.5;
        margin: 2cm;
    }
    h1 { font-size: 18pt; border-bottom: 2px solid #1a5632; padding-bottom: 6px; }
    h2 { font-size: 13pt; color: #1a5632; margin-top: 20px; }
    .meta-table { width: 100%; border-collapse: collapse; margin: 12px 0; }
    .meta-table td { padding: 4px 8px; border-bottom: 1px solid #ddd; vertical-align: top; }
    .meta-table td.label { font-weight: bold; width: 35%; color: #444; }
    pre.agent-body { white-space: pre-wrap; font-family: inherit; font-size: 10.5pt; }
    .disclaimer { margin-top: 24px; padding: 10px; background: #f5f5f0; border-left: 4px solid #999; font-size: 9pt; }
    .footer { margin-top: 24px; font-size: 8pt; color: #888; word-break: break-all; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 9pt; font-weight: bold; }
    .badge-provisional { background: #fff3cd; color: #856404; }
</style>
</head>
<body>
    <h1>{{ title }}</h1>
    <table class="meta-table">
        {% for label, value in meta_rows %}
        <tr><td class="label">{{ label }}</td><td>{{ value }}</td></tr>
        {% endfor %}
    </table>

    <h2>{{ body_heading }}</h2>
    <pre class="agent-body">{{ body_text }}</pre>

    <div class="disclaimer">{{ disclaimer }}</div>

    <div class="footer">
        Content hash (SHA-256): {{ content_hash }}<br>
        Signature: {{ signature }}<br>
        Generated: {{ generated_at }}
    </div>
</body>
</html>
