# chineseocr sidecar (optional)
#
# The GreenGru backend calls chineseocr over HTTP when CHINESE_OCR_URL is set.
# This service is NOT bundled — run it separately from the upstream repo:
# https://github.com/chineseocr/chineseocr
#
# Quick start (CPU, see upstream setup-cpu.md for model downloads):
#   git clone https://github.com/chineseocr/chineseocr.git
#   cd chineseocr
#   pip install -r requirements.txt
#   # download models into ./models per upstream README
#   python app.py 8080
#
# Then in backend/.env:
#   CHINESE_OCR_URL=http://localhost:8080/ocr
#
# Without chineseocr running, the backend still returns structured invoice
# data using mock templates keyed by filename (sample_A1, sample_A2, etc.).

services:
  chineseocr:
    image: python:3.8-slim
    profiles: ["ocr"]
    working_dir: /srv/chineseocr
    volumes:
      - ${CHINESE_OCR_DIR:-./vendor/chineseocr}:/srv/chineseocr
    ports:
      - "8080:8080"
    command: >
      bash -lc "pip install -r requirements.txt && python app.py 8080"
    restart: unless-stopped
